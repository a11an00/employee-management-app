<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact - Employee Management App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body background="image/mainbackground.jpg"> 
    <section>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="new-contact.html">New Contact</a></li>
                <li><a href="view-contacts.html">View Contacts</a></li>
            </ul>
        </nav>
    </section>

    <h1 id="new-contact-title"><strong>Add New Contact</strong></h1>
    <form id="employeeForm">
        <h2>Contact Information</h2>

        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" name="firstname" placeholder="Enter first name" required><br><br>

        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" name="lastname" placeholder="Enter last name" required><br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter email" required><br><br>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" placeholder="07XXXXXXXX"><br><br>

        <label for="department">Department:</label>
        <select id="department" name="department">
            <option value="hr">HR</option>
            <option value="it">IT</option>
            <option value="sales">Sales</option>
            <option value="marketing">Marketing</option>
        </select><br><br>

        <label for="position">Position:</label>
        <select id="position" name="position">
            <option value="manager">Manager</option>
            <option value="developer">Developer</option>
            <option value="designer">Designer</option>
        </select><br><br>

        <button type="submit"><img src="image/newuser2.png" alt="Add Contact"></button>
    </form>
    <script src="main.js"></script> 
</body>
</html>
