<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Contacts - Employee Management App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body background="image/mainbackground.jpg">
    <section>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>

                    <th>NAME</th>
                    <th>EMAIL</th>

                    <th>DEPARTMENT</th>
                    <th rowspan="4">TOOLS</th>

            </thead>
            <tbody align="center" id="contacts-table-body">

                    <td>HR</td>
                    <td>
                        <button class="edit-btn" onclick="edit()"><img id="btn" src="image/editimage.png" alt="Edit"></button>
                        <button class="delete-btn" onclick="deleteContact()"><img id="btn" src="image/deleteimage.png" alt="Delete"></button>
                        <button class="view-btn" onclick="viewContact()"><img id="btn" src="image/viewimage.png" alt="View"></button>
                    </td>
  
                </tr>
                <tr>
                    <td>2</td>
                    <td>Jane Doe</td>
                    <td>jane.doe@example.com</td>
                    <td>0798765432</td>

                    <td>
                        <button class="edit-btn" onclick="edit()"><img id="btn"src="image/editimage.png" alt="Edit"></button>
                        <button class="delete-btn" onclick="deleteContact()"><img id="btn"src="image/deleteimage.png" alt="Delete"></button>
                        <button class="view-btn" onclick="viewContact()"><img id="btn"src="image/viewimage.png" alt="View"></button>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Michael Johnson</td>
                    <td>michael.johnson@example.com</td>
                    <td>0701234567</td>
                    <td>IT</td> 
                    <td>
                        <button class="edit-btn" onclick="edit()"><img id="btn"src="image/editimage.png" alt="Edit"></button>
                        <button class="delete-btn" onclick="deleteContact()"><img id="btn"src="image/deleteimage.png" alt="Delete"></button>
                        <button class="view-btn" onclick="viewContact()"><img id="btn"src="image/viewimage.png" alt="View"></button>
                    </td>
                    </tr>
                    
             
            </tbody>
        </table>
    </div>
<script src="main.js"></script>
